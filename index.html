<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>妖妖開花通報</title>
  <style>
    :root {
      --bg: #fff8f2;
      --card: #ffffff;
      --text: #3d332d;
      --muted: #8a7b70;
      --primary: #ef7d9b;
      --primary-dark: #d95f83;
      --green: #75ad79;
      --green-dark: #5d9863;
      --border: #f0ded3;
      --danger: #d9534f;
      --danger-dark: #bd403d;
      --shadow: 0 12px 30px rgba(112, 79, 61, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 214, 226, 0.72), transparent 34%),
        radial-gradient(circle at bottom right, rgba(204, 239, 203, 0.7), transparent 32%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 28px 16px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: clamp(26px, 5vw, 42px);
      letter-spacing: 0.04em;
    }

    header p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .wrap {
      width: min(1160px, calc(100% - 28px));
      margin: 0 auto 44px;
      display: grid;
      gap: 18px;
    }

    .topbar,
    .panel,
    .card,
    .empty {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 22px;
    }

    .topbar {
      padding: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .search-area {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(239, 125, 155, 0.14);
    }

    #keyword {
      min-width: 220px;
      flex: 1;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 10px 14px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    button.secondary { background: #a99586; }
    button.secondary:hover { background: #8c7a6d; }
    button.green { background: var(--green); }
    button.green:hover { background: var(--green-dark); }
    button.danger { background: var(--danger); }
    button.danger:hover { background: var(--danger-dark); }
    button.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    button.ghost:hover {
      background: #fff8f2;
      color: var(--text);
    }

    .admin-panel {
      display: none;
      padding: 18px;
    }

    .admin-panel.active { display: block; }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field.full { grid-column: 1 / -1; }
    .field.half { grid-column: span 1; }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 6px 4px;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    textarea.coords-box {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .cards {
      display: block;
    }

    .result-table {
      width: 100%;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .result-row {
      display: grid;
      grid-template-columns: minmax(120px, 1.1fr) minmax(150px, 1.35fr) minmax(120px, 1fr) minmax(90px, 0.9fr) 86px minmax(300px, 1.9fr);
      gap: 0;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
    }

    .result-row:last-child {
      border-bottom: 0;
    }

    .result-header {
      background: #fff0f5;
      color: var(--primary-dark);
      font-weight: 900;
      font-size: 13px;
    }

    .result-cell {
      padding: 12px 10px;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      min-width: 0;
      word-break: break-word;
      line-height: 1.45;
      font-size: 14px;
    }

    .result-cell:last-child {
      border-right: 0;
    }

    .result-place {
      font-weight: 900;
      font-size: 16px;
    }

    .result-flower {
      font-weight: 800;
    }

    .result-count {
      justify-content: flex-end;
      color: var(--muted);
      font-weight: 800;
    }

    .mobile-label {
      display: none;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-right: 8px;
      white-space: nowrap;
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .row-actions button {
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 13px;
    }

    .admin-actions {
      display: none;
      flex-wrap: wrap;
      gap: 7px;
    }

    body.admin-on .admin-actions {
      display: flex;
    }


    .result-section-title {
      margin: 18px 4px 10px;
      font-size: 18px;
      font-weight: 900;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-section-title .sub {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .expired-table {
      opacity: 0.78;
    }

    .expired-row {
      grid-template-columns: minmax(120px, 1.15fr) minmax(150px, 1.35fr) minmax(120px, 1fr) minmax(90px, 0.9fr) minmax(170px, 1.25fr);
    }

    .expired-status {
      color: var(--danger);
      font-weight: 900;
      font-size: 13px;
    }

    .empty {
      text-align: center;
      padding: 36px 16px;
      color: var(--muted);
      display: none;
    }

    dialog {
      border: 0;
      border-radius: 20px;
      padding: 20px;
      width: min(420px, calc(100% - 36px));
      box-shadow: var(--shadow);
    }

    dialog::backdrop { background: rgba(40, 28, 20, 0.35); }

    .small-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .small-row input { flex: 1; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(61, 51, 45, 0.94);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 50;
      font-size: 14px;
    }

    .toast.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1024px) {
      header {
        padding: 18px 12px 10px;
      }

      header h1 {
        font-size: 24px;
      }

      header p {
        font-size: 13px;
      }

      .wrap {
        width: min(100% - 20px, 760px);
        gap: 14px;
        margin-bottom: 28px;
      }

      .admin-grid { grid-template-columns: 1fr; }
      .field.half { grid-column: 1 / -1; }
      .topbar { align-items: stretch; }
      .search-area,
      .topbar > button { width: 100%; }
      button { width: 100%; }
      .actions button,
      .small-row button { width: auto; }
      .small-row { flex-direction: column; }
      .small-row button { width: 100%; }

      .result-section-title {
        margin: 16px 4px 8px;
        font-size: 20px;
        line-height: 1.35;
        display: block;
      }

      .result-section-title .sub {
        display: block;
        margin-top: 3px;
        font-size: 13px;
      }

      .result-table {
        border-radius: 0;
        box-shadow: none;
        background: transparent;
        border: 0;
        display: grid;
        gap: 12px;
      }

      .result-row.result-header {
        display: none !important;
      }

      .result-row,
      .expired-row {
        display: grid;
        grid-template-columns: 1fr !important;
        border: 1px solid var(--border);
        border-radius: 22px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .result-cell {
        display: flex;
        align-items: center;
        gap: 8px;
        border-right: 0;
        border-bottom: 1px solid var(--border);
        padding: 12px 14px;
        min-height: 48px;
      }

      .result-cell:last-child {
        border-bottom: 0;
      }

      .result-place {
        font-size: 19px;
      }

      .result-flower {
        font-size: 17px;
      }

      .result-count {
        justify-content: flex-start;
      }

      .mobile-label {
        display: inline-block;
        width: 48px;
        flex: 0 0 48px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 900;
        margin-right: 0;
      }

      .row-actions {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .row-actions button,
      .admin-actions button {
        width: 100%;
        padding: 10px 8px;
        font-size: 14px;
      }

      .admin-actions {
        display: none;
        grid-column: 1 / -1;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        width: 100%;
      }

      body.admin-on .admin-actions {
        display: grid;
      }

      .expired-status {
        grid-column: 1 / -1;
        padding: 4px 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🌸 Pikmin Bloom 開花通報</h1>
    <p>Admin 分享開花成果，User 一鍵複製座標。</p>
  </header>

  <main class="wrap">
    <section class="topbar">
      <div class="search-area">
        <input id="keyword" type="search" placeholder="搜尋地點、花色、花種、備註…" />
        <select id="colorFilter">
          <option value="">全部花色</option>
        </select>
        <select id="flowerFilter">
          <option value="">全部花種</option>
        </select>
      </div>
      <button id="adminLoginBtn" class="secondary">Admin 管理</button>
      <button id="logoutBtn" class="ghost" style="display:none;">離開管理</button>
    </section>

    <section id="adminPanel" class="panel admin-panel">
      <div class="admin-grid">
        <div class="field half">
          <label for="rawInput">貼上內容</label>
          <textarea id="rawInput" placeholder="例如：
&quot;妖妖C左
🌸紅色菊花25株
⏰5/26 12:05
🚫勿轉傳&amp;勿偷田
📝隨意收&quot;"></textarea>
        </div>

        <div class="field half">
          <label for="coordsInput">貼上座標</label>
          <textarea id="coordsInput" class="coords-box" placeholder="例如：
25.000000,121.000000
25.000001,121.000001
25.000002,121.000002"></textarea>
        </div>

        <div class="field">
          <label for="placeInput">地點 / 花田名稱</label>
          <input id="placeInput" type="text" placeholder="例如：妖妖C左" />
        </div>

        <div class="field">
          <label for="timeInput">開花時間</label>
          <input id="timeInput" type="text" placeholder="例如：5/26 12:05" />
        </div>

        <div class="field">
          <label for="colorInput">花朵顏色</label>
          <select id="colorInput"></select>
        </div>

        <div class="field">
          <label for="flowerInput">花朵種類</label>
          <select id="flowerInput"></select>
        </div>

        <div class="field">
          <label for="amountInput">株數（自動等於座標數量）</label>
          <input id="amountInput" type="number" min="0" placeholder="依座標數量自動計算" readonly />
        </div>

        <div class="field">
          <label for="noteInput">備註</label>
          <input id="noteInput" type="text" placeholder="例如：隨意收" />
        </div>
      </div>

      <div class="actions">
        <button id="parseBtn" class="green">從通報文字自動解析</button>
        <button id="saveBtn">新增 / 更新通報</button>
        <button id="clearFormBtn" class="ghost">清空輸入</button>
        <button id="deleteAllBtn" class="danger">刪除全部通報</button>
      </div>

      <div class="hint">
        管理密碼已改由 Google Apps Script 驗證，HTML 不再保存管理密碼。<br />
        目前資料會寫入 Google Spreadsheet，所有使用者會讀取同一份通報資料。
      </div>
    </section>

    <section id="cards" class="cards"></section>
    <div id="empty" class="empty">目前沒有符合條件的開花通報。</div>
  </main>

  <dialog id="loginDialog">
    <h3 style="margin-top:0;">Admin 管理登入</h3>
    <p style="color:var(--muted);line-height:1.6;">輸入管理密碼後，可新增、編輯、刪除通報。</p>
    <div class="small-row">
      <input id="passwordInput" type="password" placeholder="管理密碼" />
      <button id="confirmLoginBtn">登入</button>
    </div>
    <div class="small-row">
      <button id="cancelLoginBtn" class="ghost">取消</button>
    </div>
  </dialog>

  <div id="toast" class="toast"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzpugfRUGMJ1fAM-c1jTX3ig6NG1MbmEPWKft7IxxIQ2hJVe3WiL8mO-_eKa3EfP9xg/exec";

    const COLORS = ["混色", "黃色", "紅色", "藍色", "白色"];
    const FLOWERS = [
      "三色堇", "玫瑰", "聖誕紅", "山茶花", "梅花", "櫻花", "鬱金香", "康乃馨", "繡球花", "百合",
      "向日葵", "彼岸花", "大波斯菊", "兔耳花", "水仙", "銀蓮花", "粉蝶花", "海芋", "雞蛋花", "扶桑花",
      "石竹", "龍膽", "菊花", "聖誕玫瑰", "嘉德麗雅蘭", "風信子", "豌豆花", "鈴蘭", "牡丹", "睡蓮",
      "牽牛花", "九重葛", "大理花", "鐵線蓮", "雪花蓮", "小蒼蘭", "油菜花", "週年玫瑰", "鳶尾花", "天堂鳥",
      "雞冠花", "萬壽菊", "鼠尾草", "櫻草花", "蝴蝶蘭", "金魚草", "矮牽牛", "鸚鵡鬱金香", "勿忘草", "風鈴草"
    ];

    let reports = [];
    let editingId = null;
    let adminPassword = sessionStorage.getItem("pikminAdminPassword") || "";
    let isAdmin = sessionStorage.getItem("pikminAdmin") === "true" && !!adminPassword;
    let toastTimer = null;

    const $ = (id) => document.getElementById(id);

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("active");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("active"), 1600);
    }

    function fillOptions() {
      for (const color of COLORS) {
        $("colorInput").append(new Option(color, color));
        $("colorFilter").append(new Option(color, color));
      }
      for (const flower of FLOWERS) {
        $("flowerInput").append(new Option(flower, flower));
        $("flowerFilter").append(new Option(flower, flower));
      }
    }

    function cleanSpreadsheetText(text) {
      return String(text || "")
        .trim()
        .replace(/^"+|"+$/g, "")
        .replace(/""/g, '"')
        .replace(/\r\n/g, "\n")
        .trim();
    }

    function cleanCoordsText(text) {
      return cleanSpreadsheetText(text)
        .split("\n")
        .map(line => line.trim().replace(/^"+|"+$/g, ""))
        .filter(Boolean)
        .join("\n");
    }

    function getCoordCount(text) {
      const cleaned = cleanCoordsText(text);
      return cleaned ? cleaned.split("\n").filter(Boolean).length : 0;
    }

    function syncAmountWithCoords() {
      $("amountInput").value = getCoordCount($("coordsInput").value) || "";
    }

    function parseReportText(text) {
      const cleaned = cleanSpreadsheetText(text);
      const lines = cleaned.split("\n").map(line => line.trim()).filter(Boolean);
      const firstLine = lines[0] || "";
      const flowerLine = lines.find(line => line.includes("🌸")) || "";
      const timeLine = lines.find(line => line.includes("⏰")) || "";
      const noteLine = lines.find(line => line.includes("📝")) || "";

      const color = COLORS.find(c => flowerLine.includes(c)) || "";
      const flower = FLOWERS.find(f => flowerLine.includes(f)) || "";
      const amountMatch = flowerLine.match(/(\d+)\s*株/);
      const timeMatch = timeLine.match(/(\d{1,2}\/\d{1,2}\s+\d{1,2}:\d{2})/);

      return {
        place: firstLine,
        color,
        flower,
        amount: amountMatch ? amountMatch[1] : "",
        time: timeMatch ? timeMatch[1] : timeLine.replace("⏰", "").trim(),
        note: noteLine.replace("📝", "").trim(),
        raw: cleaned
      };
    }

    async function loadReports() {
      try {
        const res = await fetch(`${API_URL}?action=list&ts=${Date.now()}`);
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || "讀取資料失敗");
        }

        reports = data.reports || [];
      } catch (error) {
        console.error(error);
        reports = [];
        showToast("讀取 Google Sheet 失敗");
      }
    }

    async function verifyAdminPassword(password) {
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "verify",
            adminPassword: password
          })
        });

        const data = await res.json();
        return !!data.success;
      } catch (error) {
        console.error(error);
        alert("無法驗證管理密碼，請確認 Apps Script 已重新部署，且存取權限為任何人。");
        return false;
      }
    }

    async function saveReportToSheet(report) {
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "save",
            adminPassword,
            report
          })
        });
        const data = await res.json();

        if (!data.success) {
          alert(data.message || "儲存失敗");
          return false;
        }

        return true;
      } catch (error) {
        console.error(error);
        alert("儲存失敗，請確認 Apps Script 已部署為 Web App，且存取權限為任何人。");
        return false;
      }
    }

    async function deleteReportFromSheet(id) {
      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "delete",
            adminPassword,
            id
          })
        });
        const data = await res.json();

        if (!data.success) {
          alert(data.message || "刪除失敗");
          return false;
        }

        return true;
      } catch (error) {
        console.error(error);
        alert("刪除失敗，請確認 Apps Script 已部署為 Web App，且存取權限為任何人。");
        return false;
      }
    }

    function setAdminMode(value) {
      isAdmin = value;
      sessionStorage.setItem("pikminAdmin", value ? "true" : "false");
      document.body.classList.toggle("admin-on", value);
      $("adminPanel").classList.toggle("active", value);
      $("adminLoginBtn").style.display = value ? "none" : "inline-block";
      $("logoutBtn").style.display = value ? "inline-block" : "none";
      renderReports();
    }

    function getFormData() {
      const raw = cleanSpreadsheetText($("rawInput").value);
      return {
        id: editingId || crypto.randomUUID(),
        place: $("placeInput").value.trim(),
        color: $("colorInput").value,
        flower: $("flowerInput").value,
        amount: String(getCoordCount($("coordsInput").value)),
        time: $("timeInput").value.trim(),
        note: $("noteInput").value.trim(),
        raw,
        coords: cleanCoordsText($("coordsInput").value),
        updatedAt: new Date().toISOString()
      };
    }

    function setFormData(report) {
      editingId = report.id;
      $("rawInput").value = report.raw || "";
      $("coordsInput").value = report.coords || "";
      $("placeInput").value = report.place || "";
      $("colorInput").value = report.color || COLORS[0];
      $("flowerInput").value = report.flower || FLOWERS[0];
      $("amountInput").value = report.coords ? getCoordCount(report.coords) : (report.amount || "");
      $("timeInput").value = formatDisplayTime(report.time) || "";
      $("noteInput").value = report.note || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function clearForm() {
      editingId = null;
      $("rawInput").value = "";
      $("coordsInput").value = "";
      $("placeInput").value = "";
      $("timeInput").value = "";
      $("amountInput").value = "";
      $("noteInput").value = "";
      $("colorInput").value = COLORS[0];
      $("flowerInput").value = FLOWERS[0];
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function buildDisplayText(report) {
      if (report.raw) {
        const coordCount = report.coords ? report.coords.split("\n").filter(Boolean).length : Number(report.amount || 0);
        return report.raw.replace(/(🌸[^\n]*?)(\d+)\s*株/, `$1${coordCount}株`);
      }
      return `${report.place}\n🌸${report.color}${report.flower}${report.amount ? report.amount + "株" : ""}\n⏰${formatDisplayTime(report.time)}\n📝${report.note}`.trim();
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function formatDisplayTime(timeText) {
      const value = String(timeText || "").trim();
      if (!value) return "";

      const normalMatch = value.match(/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})/);
      if (normalMatch) {
        return `${Number(normalMatch[1])}/${Number(normalMatch[2])} ${pad2(Number(normalMatch[3]))}:${normalMatch[4]}`;
      }

      const date = new Date(value);
      if (!Number.isNaN(date.getTime())) {
        return `${date.getMonth() + 1}/${date.getDate()} ${pad2(date.getHours())}:${pad2(date.getMinutes())}`;
      }

      return value;
    }

    function parseOpeningDate(timeText) {
      const value = String(timeText || "").trim();
      if (!value) return null;

      const dateFromSheet = new Date(value);
      if (!Number.isNaN(dateFromSheet.getTime()) && /\d{4}-\d{2}-\d{2}T/.test(value)) {
        return dateFromSheet;
      }

      const displayValue = formatDisplayTime(value);
      const match = displayValue.match(/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})/);
      if (!match) return null;

      const now = new Date();
      const month = Number(match[1]);
      const day = Number(match[2]);
      const hour = Number(match[3]);
      const minute = Number(match[4]);
      const openedAt = new Date(now.getFullYear(), month - 1, day, hour, minute, 0, 0);

      if (openedAt.getTime() - now.getTime() > 180 * 24 * 60 * 60 * 1000) {
        openedAt.setFullYear(openedAt.getFullYear() - 1);
      }

      return openedAt;
    }

    function isExpiredReport(report) {
      const openedAt = parseOpeningDate(report.time);
      if (!openedAt) return false;
      return Date.now() - openedAt.getTime() > 60 * 60 * 1000;
    }

    async function copyCoords(id) {
      const report = reports.find(item => item.id === id);
      const coords = report && report.coords ? report.coords : "";
      if (!coords) {
        showToast("這筆通報沒有座標可以複製");
        return;
      }

      try {
        await navigator.clipboard.writeText(coords);
        showToast("已複製座標");
      } catch (error) {
        const temp = document.createElement("textarea");
        temp.value = coords;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
        showToast("已複製座標");
      }
    }

    async function copyContent(id) {
      const report = reports.find(item => item.id === id);
      const content = report ? buildDisplayText(report) : "";
      if (!content) {
        showToast("這筆通報沒有內文可以複製");
        return;
      }

      try {
        await navigator.clipboard.writeText(content);
        showToast("已複製內文");
      } catch (error) {
        const temp = document.createElement("textarea");
        temp.value = content;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
        showToast("已複製內文");
      }
    }

    function renderReports() {
      const keyword = $("keyword").value.trim().toLowerCase();
      const color = $("colorFilter").value;
      const flower = $("flowerFilter").value;

      const filtered = reports.filter(report => {
        const combined = JSON.stringify(report).toLowerCase();
        return (!keyword || combined.includes(keyword)) &&
          (!color || report.color === color) &&
          (!flower || report.flower === flower);
      });

      if (!filtered.length) {
        $("cards").innerHTML = "";
        $("empty").style.display = "block";
        return;
      }

      const activeReports = filtered.filter(report => !isExpiredReport(report));
      const expiredReports = filtered.filter(report => isExpiredReport(report));

      function renderActiveTable(list) {
        if (!list.length) return "";

        return `
          <div class="result-section-title">可收果區域 <span class="sub">開花後 1 小時內提供座標</span></div>
          <div class="result-table active-table">
            <div class="result-row result-header">
              <div class="result-cell">花田名稱</div>
              <div class="result-cell">花朵</div>
              <div class="result-cell">開花時間</div>
              <div class="result-cell">備註</div>
              <div class="result-cell result-count">座標數</div>
              <div class="result-cell">操作</div>
            </div>
            ${list.map(report => {
              const coordCount = report.coords ? report.coords.split("\n").filter(Boolean).length : 0;
              const flowerText = `${report.color || "未填花色"}${report.flower || "未填花種"}${report.amount ? report.amount + "株" : ""}`;
              return `
                <div class="result-row">
                  <div class="result-cell result-place"><span class="mobile-label">花田</span>${escapeHtml(report.place || "未命名花田")}</div>
                  <div class="result-cell result-flower"><span class="mobile-label">花朵</span>🌸 ${escapeHtml(flowerText)}</div>
                  <div class="result-cell"><span class="mobile-label">時間</span>⏰ ${escapeHtml(formatDisplayTime(report.time) || "未填時間")}</div>
                  <div class="result-cell"><span class="mobile-label">備註</span>📝 ${escapeHtml(report.note || "無備註")}</div>
                  <div class="result-cell result-count"><span class="mobile-label">座標</span>${coordCount}</div>
                  <div class="result-cell">
                    <div class="row-actions">
                      <button onclick="copyContent('${report.id}')">複製內文</button>
                      <button class="green" onclick="copyCoords('${report.id}')">複製座標</button>
                      <span class="admin-actions">
                        <button class="green" onclick="editReport('${report.id}')">編輯</button>
                        <button class="danger" onclick="deleteReport('${report.id}')">刪除</button>
                      </span>
                    </div>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;
      }

      function renderExpiredTable(list) {
        if (!list.length) return "";

        return `
          <div class="result-section-title">過期區域 <span class="sub">開花超過 1 小時，不提供座標</span></div>
          <div class="result-table expired-table">
            <div class="result-row result-header expired-row">
              <div class="result-cell">花田名稱</div>
              <div class="result-cell">花朵</div>
              <div class="result-cell">開花時間</div>
              <div class="result-cell">備註</div>
              <div class="result-cell">狀態 / 操作</div>
            </div>
            ${list.map(report => {
              const flowerText = `${report.color || "未填花色"}${report.flower || "未填花種"}${report.amount ? report.amount + "株" : ""}`;
              return `
                <div class="result-row expired-row">
                  <div class="result-cell result-place"><span class="mobile-label">花田</span>${escapeHtml(report.place || "未命名花田")}</div>
                  <div class="result-cell result-flower"><span class="mobile-label">花朵</span>🌸 ${escapeHtml(flowerText)}</div>
                  <div class="result-cell"><span class="mobile-label">時間</span>⏰ ${escapeHtml(formatDisplayTime(report.time) || "未填時間")}</div>
                  <div class="result-cell"><span class="mobile-label">備註</span>📝 ${escapeHtml(report.note || "無備註")}</div>
                  <div class="result-cell">
                    <div class="row-actions">
                      <span class="expired-status">已過期</span>
                      <span class="admin-actions">
                        <button class="green" onclick="editReport('${report.id}')">編輯</button>
                        <button class="danger" onclick="deleteReport('${report.id}')">刪除</button>
                      </span>
                    </div>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;
      }

      $("cards").innerHTML = renderActiveTable(activeReports) + renderExpiredTable(expiredReports);
      $("empty").style.display = "none";
    }


    function editReport(id) {
      const report = reports.find(item => item.id === id);
      if (report) setFormData(report);
    }

    async function deleteReport(id) {
      if (!confirm("確定要刪除此通報嗎？")) return;

      const success = await deleteReportFromSheet(id);
      if (!success) return;

      await loadReports();
      renderReports();
      showToast("已刪除通報");
    }

    window.copyCoords = copyCoords;
    window.copyContent = copyContent;
    window.editReport = editReport;
    window.deleteReport = deleteReport;

    $("parseBtn").addEventListener("click", () => {
      const rawText = cleanSpreadsheetText($("rawInput").value);
      const coordsText = cleanCoordsText($("coordsInput").value);

      if (!rawText || !coordsText) {
        alert("請先填入「通報文字」與「座標們」兩個欄位，再進行解析，避免資料缺漏。");
        return;
      }

      const parsed = parseReportText(rawText);
      const coordCount = getCoordCount(coordsText);
      $("rawInput").value = parsed.raw;
      $("coordsInput").value = coordsText;
      $("placeInput").value = parsed.place;
      if (parsed.color) $("colorInput").value = parsed.color;
      if (parsed.flower) $("flowerInput").value = parsed.flower;
      $("amountInput").value = coordCount;
      $("timeInput").value = parsed.time;
      $("noteInput").value = parsed.note;
      showToast(`已解析，株數已套用座標數量：${coordCount}`);
    });

    $("saveBtn").addEventListener("click", async () => {
      const rawText = cleanSpreadsheetText($("rawInput").value);
      const coordsText = cleanCoordsText($("coordsInput").value);

      if (!rawText || !coordsText) {
        alert("請先填入「通報文字」與「座標們」兩個欄位，再儲存通報，避免資料缺漏。");
        return;
      }

      $("rawInput").value = rawText;
      $("coordsInput").value = coordsText;
      syncAmountWithCoords();

      const data = getFormData();
      if (!data.place) {
        alert("請至少填寫地點 / 花田名稱。若已貼上通報文字，可先按「從通報文字自動解析」。");
        return;
      }

      const success = await saveReportToSheet(data);
      if (!success) return;

      await loadReports();
      clearForm();
      renderReports();
      showToast("已儲存通報");
    });

    $("clearFormBtn").addEventListener("click", clearForm);

    $("deleteAllBtn").addEventListener("click", async () => {
      if (!confirm("確定要刪除全部通報嗎？此動作無法復原。")) return;
      const ids = reports.map(item => item.id).filter(Boolean);
      for (const id of ids) {
        const success = await deleteReportFromSheet(id);
        if (!success) return;
      }

      await loadReports();
      renderReports();
      showToast("已刪除全部通報");
    });

    $("coordsInput").addEventListener("input", syncAmountWithCoords);
    $("keyword").addEventListener("input", renderReports);
    $("colorFilter").addEventListener("change", renderReports);
    $("flowerFilter").addEventListener("change", renderReports);

    $("adminLoginBtn").addEventListener("click", () => $("loginDialog").showModal());
    $("cancelLoginBtn").addEventListener("click", () => $("loginDialog").close());
    $("passwordInput").addEventListener("keydown", event => {
      if (event.key === "Enter") $("confirmLoginBtn").click();
    });
    $("confirmLoginBtn").addEventListener("click", async () => {
      const inputPassword = $("passwordInput").value;

      if (!inputPassword) {
        alert("請輸入管理密碼。");
        return;
      }

      const ok = await verifyAdminPassword(inputPassword);

      if (ok) {
        adminPassword = inputPassword;
        sessionStorage.setItem("pikminAdminPassword", inputPassword);
        $("passwordInput").value = "";
        $("loginDialog").close();
        setAdminMode(true);
        showToast("已進入管理模式");
      } else {
        alert("管理密碼錯誤。");
      }
    });

    $("logoutBtn").addEventListener("click", () => {
      clearForm();
      adminPassword = "";
      sessionStorage.removeItem("pikminAdminPassword");
      setAdminMode(false);
      showToast("已離開管理模式");
    });

    fillOptions();
    loadReports().then(() => {
      setAdminMode(isAdmin);
      renderReports();
    });
    setInterval(async () => {
      await loadReports();
      renderReports();
    }, 60000);
  </script>
</body>
</html>
